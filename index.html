<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Physics Sandbox</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --bg-color: #09090b;
            --panel-bg: rgba(20, 20, 25, 0.65);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: var(--text-main);
        }

        /* Subtiles Apple-Style Konstruktionsgitter */
        #sandboxCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }

        /* Zentriertes Premium-Bedienfeld (Glassmorphism) */
        .ui-container {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 90%;
            max-width: 800px;
            background: var(--panel-bg);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            padding: 20px 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .ui-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        /* Werkzeug-Auswahl-Gruppe */
        .tool-group {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .btn-tool {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .btn-tool svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .btn-tool:hover {
            color: var(--text-main);
        }

        .btn-tool.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        /* Funktionstasten */
        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s, border-color 0.2s;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .btn-action.clear-btn {
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.1);
            background: rgba(239, 68, 68, 0.05);
        }

        .btn-action.clear-btn:hover {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.2);
        }

        /* Regler Sektion */
        .sliders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            width: 100%;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 16px;
        }

        .slider-control {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .slider-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .slider-input {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }

        .slider-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .slider-input::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body>

    <canvas id="sandboxCanvas"></canvas>

    <div class="ui-container">
        <div class="ui-row">
            <div class="tool-group">
                <button class="btn-tool active" data-shape="circle">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                    Kreis
                </button>
                <button class="btn-tool" data-shape="rectangle">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                    Rechteck
                </button>
                <button class="btn-tool" data-shape="liquid">
                    <svg viewBox="0 0 24 24"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                    Flüssigkeit
                </button>
            </div>

            <div style="display: flex; gap: 8px;">
                <button class="btn-action" id="gravityInvertBtn">
                    Schwerkraft umkehren
                </button>
                <button class="btn-action clear-btn" id="clearBtn">
                    Zurücksetzen
                </button>
            </div>
        </div>

        <div class="sliders-grid">
            <div class="slider-control">
                <span class="slider-label">Gravitation <span id="val-gravity">1.0</span></span>
                <input type="range" class="slider-input" id="slide-gravity" min="0" max="3" step="0.1" value="1.0">
            </div>
            <div class="slider-control">
                <span class="slider-label">Bounciness <span id="val-bounce">0.6</span></span>
                <input type="range" class="slider-input" id="slide-bounce" min="0" max="1" step="0.05" value="0.6">
            </div>
            <div class="slider-control">
                <span class="slider-label">Reibung <span id="val-friction">0.1</span></span>
                <input type="range" class="slider-input" id="slide-friction" min="0" max="1" step="0.05" value="0.1">
            </div>
            <div class="slider-control">
                <span class="slider-label">Zeitskala <span id="val-timescale">1.0</span></span>
                <input type="range" class="slider-input" id="slide-timescale" min="0.1" max="2" step="0.1" value="1.0">
            </div>
        </div>
    </div>

    <script>
        // Engine-Module destrukturieren
        const { Engine, World, Bodies, Composite, Mouse, MouseConstraint } = Matter;

        // Setup Haupt-Canvas
        const canvas = document.getElementById('sandboxCanvas');
        const ctx = canvas.getContext('2d');

        // Setup dedizierter Offscreen-Canvas für die Flüssigkeits-Metaballs
        const liquidCanvas = document.createElement('canvas');
        const liquidCtx = liquidCanvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // Core Physics Engine initialisieren
        const engine = Engine.create();
        engine.gravity.y = 1.0;

        let activeShape = 'circle';
        let boundaries = [];

        // Globale Konfigurationswerte (gespeist über UI-Regler)
        let currentRestitution = 0.6;
        let currentFriction = 0.1;

        // Wände generieren (statische Körper)
        function createBoundaries() {
            if (boundaries.length > 0) {
                Composite.remove(engine.world, boundaries);
            }

            const thickness = 100;
            boundaries = [
                // Boden
                Bodies.rectangle(width / 2, height + thickness / 2, width + 200, thickness, { isStatic: true, friction: 0.5 }),
                // Decke
                Bodies.rectangle(width / 2, -thickness / 2, width + 200, thickness, { isStatic: true, friction: 0.5 }),
                // Links
                Bodies.rectangle(-thickness / 2, height / 2, thickness, height + 200, { isStatic: true, friction: 0.5 }),
                // Rechts
                Bodies.rectangle(width + thickness / 2, height / 2, thickness, height + 200, { isStatic: true, friction: 0.5 })
            ];

            Composite.add(engine.world, boundaries);
        }

        // Interaktives Maus-Dragging initialisieren
        const mouse = Mouse.create(canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: {
                stiffness: 0.15,
                render: { visible: false }
            }
        });
        Composite.add(engine.world, mouseConstraint);

        // Klick-Aktionen abfangen (Objekt-Erzeugung nur, wenn die Maus kein Objekt hält)
        canvas.addEventListener('mousedown', (e) => {
            if (mouseConstraint.body) return;
            spawnObject(e.clientX, e.clientY);
        });

        // Touch-Support für Mobile/Tablets
        canvas.addEventListener('touchstart', (e) => {
            if (mouseConstraint.body || e.touches.length === 0) return;
            const touch = e.touches[0];
            spawnObject(touch.clientX, touch.clientY);
        });

        // Objekt-Erzeugungslogik
        function spawnObject(x, y) {
            if (activeShape === 'circle') {
                const radius = Math.random() * 20 + 15;
                const circle = Bodies.circle(x, y, radius, {
                    restitution: currentRestitution,
                    friction: currentFriction,
                    render: { type: 'circle', color: '#d946ef', radius: radius }
                });
                Composite.add(engine.world, circle);
            } 
            else if (activeShape === 'rectangle') {
                const w = Math.random() * 40 + 30;
                const h = Math.random() * 40 + 30;
                const rect = Bodies.rectangle(x, y, w, h, {
                    restitution: currentRestitution,
                    friction: currentFriction,
                    render: { type: 'rectangle', color: '#06b6d4', width: w, height: h }
                });
                Composite.add(engine.world, rect);
            } 
            else if (activeShape === 'liquid') {
                // Erzeugt dichte Partikelcluster, die zu einer Flüssigkeit verschmelzen
                const clusterRows = 4;
                const clusterCols = 4;
                const spacing = 12;

                for (let r = 0; r < clusterRows; r++) {
                    for (let c = 0; c < clusterCols; c++) {
                        const pX = x + (c - clusterCols / 2) * spacing;
                        const pY = y + (r - clusterRows / 2) * spacing;
                        const particleRadius = 7;

                        const particle = Bodies.circle(pX, pY, particleRadius, {
                            restitution: 0.1, // Flüssigkeiten prallen kaum elastisch ab
                            friction: 0.02,   // Sehr gleitfähig
                            density: 0.05,     // Höheres Gewicht für plastische Dynamik
                            render: { type: 'liquid', color: '#3b82f6', radius: particleRadius }
                        });
                        Composite.add(engine.world, particle);
                    }
                }
            }
        }

        // Hochperformanter Custom-Render-Loop
        function updateSimulation() {
            // Physikwelt um einen Schritt vorantreiben
            Engine.update(engine);

            // Hauptcanvas säubern
            ctx.clearRect(0, 0, width, height);

            // Offscreencanvas für Flüssigkeitseffekte vorbereiten
            liquidCtx.clearRect(0, 0, width, height);

            // Alle registrierten Physikkörper auslesen
            const bodies = Composite.allBodies(engine.world);

            // Flüssigkeitsfilter für organische Metaballs auf dem Sekundärcanvas definieren
            liquidCtx.filter = 'blur(10px) contrast(22)';

            bodies.forEach(body => {
                // Statische Wände ignorieren beim Rendern
                if (body.isStatic) return;

                const customData = body.render;
                
                if (customData.type === 'liquid') {
                    // Partikel auf dem Offscreen-Canvas zeichnen
                    liquidCtx.fillStyle = customData.color;
                    liquidCtx.beginPath();
                    liquidCtx.arc(body.position.x, body.position.y, customData.radius + 4, 0, Math.PI * 2);
                    liquidCtx.fill();
                } else {
                    // Standardformen direkt gestochen scharf auf den Hauptcanvas rendern
                    ctx.save();
                    ctx.translate(body.position.x, body.position.y);
                    ctx.rotate(body.angle);
                    ctx.fillStyle = customData.color;
                    
                    // Subtiler innerer Glanz über Schatteneffekte
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = customData.color + '40';

                    ctx.beginPath();
                    if (customData.type === 'circle') {
                        ctx.arc(0, 0, customData.radius, 0, Math.PI * 2);
                        // Ausrichtungslinie zeichnen, um Rotation sichtbar zu machen
                        ctx.fill();
                        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(customData.radius, 0);
                        ctx.stroke();
                    } else if (customData.type === 'rectangle') {
                        ctx.rect(-customData.width / 2, -customData.height / 2, customData.width, customData.height);
                        ctx.fill();
                    }
                    ctx.restore();
                }
            });

            // Die prozessierte, organische Flüssigkeitsschicht über das Hauptbild legen
            ctx.drawImage(liquidCanvas, 0, 0);

            // Drag-Indikator zeichnen (subtile elastische Verbindungslinie beim Ziehen)
            if (mouseConstraint.body) {
                ctx.beginPath();
                ctx.moveTo(mouseConstraint.pointerPosition.x, mouseConstraint.pointerPosition.y);
                ctx.lineTo(mouseConstraint.body.position.x, mouseConstraint.body.position.y);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 4]);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            requestAnimationFrame(updateSimulation);
        }

        // --- UI Controller & Event Listener Implementation ---

        // Werkzeug-Umschalter
        document.querySelectorAll('.btn-tool').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.btn-tool').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                activeShape = this.getAttribute('data-shape');
            });
        });

        // Schwerkraft Schieberegler
        const slideGravity = document.getElementById('slide-gravity');
        const valGravity = document.getElementById('val-gravity');
        slideGravity.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            // Vorzeichen beibehalten bei Wertänderung
            const direction = engine.gravity.y >= 0 ? 1 : -1;
            engine.gravity.y = val * direction;
            valGravity.innerText = val.toFixed(1);
        });

        // Invertierungs-Button Schwerkraft
        document.getElementById('gravityInvertBtn').addEventListener('click', () => {
            engine.gravity.y = -engine.gravity.y;
        });

        // Elastizitäts Schieberegler (Bounciness)
        const slideBounce = document.getElementById('slide-bounce');
        const valBounce = document.getElementById('val-bounce');
        slideBounce.addEventListener('input', (e) => {
            currentRestitution = parseFloat(e.target.value);
            valBounce.innerText = currentRestitution.toFixed(2);
        });

        // Reibungs Schieberegler
        const slideFriction = document.getElementById('slide-friction');
        const valFriction = document.getElementById('val-friction');
        slideFriction.addEventListener('input', (e) => {
            currentFriction = parseFloat(e.target.value);
            valFriction.innerText = currentFriction.toFixed(2);
        });

        // Zeitskala Schieberegler
        const slideTimescale = document.getElementById('slide-timescale');
        const valTimescale = document.getElementById('val-timescale');
        slideTimescale.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            engine.timing.timeScale = val;
            valTimescale.innerText = val.toFixed(1);
        });

        // Reset-Button (Entfernt alle Objekte außer den Begrenzungswänden)
        document.getElementById('clearBtn').addEventListener('click', () => {
            const allBodies = Composite.allBodies(engine.world);
            allBodies.forEach(body => {
                if (!body.isStatic) {
                    Composite.remove(engine.world, body);
                }
            });
        });

        // Skalierungs-Management bei Fenstergrößen-Änderung
        window.addEventListener('resize', () => {
            width = canvas.width = liquidCanvas.width = window.innerWidth;
            height = canvas.height = liquidCanvas.height = window.innerHeight;
            createBoundaries();
        });

        // Initialisierungsausführung
        createBoundaries();
        liquidCanvas.width = width;
        liquidCanvas.height = height;
        updateSimulation();

    </script>
</body>
</html>
